<svg width="1440" height="1080" viewBox="0 0 1440 1080" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1440" height="1080" fill="#EEF2F7"/>

  <!-- title -->
  <text x="720" y="56" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">AWS Cloud Misconfiguration Auto-Remediation</text>
  <text x="720" y="88" text-anchor="middle" font-size="15" fill="#64748B">Serverless, event-driven security pipeline &#8212; detect &#8226; remediate &#8226; alert &#8226; audit</text>

  <!-- region boundary -->
  <rect x="40" y="118" width="1360" height="852" rx="16" fill="#FFFFFF" stroke="#FB923C" stroke-width="2" stroke-dasharray="8 6"/>
  <rect x="40" y="118" width="262" height="30" rx="8" fill="#0F172A"/>
  <text x="56" y="138" font-size="13" font-weight="600" fill="#FFFFFF">AWS Cloud &#183; Region us-east-1</text>

  <!-- ================= CONNECTORS ================= -->
  <!-- 1 Resources -> Config -->
  <path d="M240,310 L240,378" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 2 Config -> EventBridge -->
  <path d="M240,600 L240,658" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 3 EventBridge -> Lambda -->
  <path d="M390,725 L475,725 L475,530 L558,530" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Lambda -> bus trunk -->
  <path d="M880,530 L960,530" fill="none" stroke="#64748B" stroke-width="2"/>
  <path d="M960,260 L960,765" fill="none" stroke="#64748B" stroke-width="2"/>
  <!-- 4 -> Remediation -->
  <path d="M960,260 L1038,260" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 6 -> DynamoDB -->
  <path d="M960,430 L1038,430" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 7 -> CloudWatch -->
  <path d="M960,600 L1038,600" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 5 -> SNS -->
  <path d="M960,765 L1038,765" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- SNS -> Admin -->
  <path d="M1190,820 L1190,858" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1205" y="845" font-size="12" fill="#64748B">email</text>
  <!-- 8 Remediation -> Resources (feedback) -->
  <path d="M1190,200 L1190,168 L240,168 L240,188" fill="none" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowg)"/>
  <text x="715" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#16A34A">resource secured &#8212; re-evaluated as COMPLIANT</text>

  <!-- ================= NODES ================= -->

  <!-- Resources -->
  <g filter="url(#sh)">
    <rect x="90" y="190" width="300" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="106" y="206" width="28" height="28" rx="7" fill="#16A34A"/>
  <text x="120" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">AWS</text>
  <text x="146" y="220" font-size="15" font-weight="700" fill="#0F172A">Monitored Resources</text>
  <text x="106" y="258" font-size="12.5" fill="#334155">&#8226; Amazon S3 bucket</text>
  <text x="106" y="280" font-size="12.5" fill="#334155">&#8226; Amazon EC2 security group</text>
  <text x="106" y="300" font-size="11" fill="#94A3B8">test resource: fyp-public-test-123</text>

  <!-- AWS Config -->
  <g filter="url(#sh)">
    <rect x="90" y="378" width="300" height="222" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="106" y="394" width="28" height="28" rx="7" fill="#7C3AED"/>
  <text x="120" y="413" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">C</text>
  <text x="146" y="408" font-size="15" font-weight="700" fill="#0F172A">AWS Config</text>
  <text x="106" y="440" font-size="11.5" fill="#64748B">Continuous compliance evaluation</text>
  <text x="106" y="468" font-size="11" font-family="Consolas, Menlo, monospace" fill="#334155">s3-bucket-public-read-prohibited</text>
  <text x="106" y="490" font-size="11" font-family="Consolas, Menlo, monospace" fill="#334155">s3-bucket-public-write-prohibited</text>
  <text x="106" y="512" font-size="11" font-family="Consolas, Menlo, monospace" fill="#334155">restricted-ssh</text>
  <text x="106" y="534" font-size="11" font-family="Consolas, Menlo, monospace" fill="#334155">iam-user-mfa-enabled</text>
  <text x="106" y="556" font-size="11" font-family="Consolas, Menlo, monospace" fill="#334155">root-account-mfa-enabled</text>
  <text x="106" y="584" font-size="10.5" fill="#94A3B8">5 AWS managed rules &#183; DETECTIVE</text>

  <!-- EventBridge -->
  <g filter="url(#sh)">
    <rect x="90" y="658" width="300" height="142" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="106" y="674" width="28" height="28" rx="7" fill="#FF9900"/>
  <text x="120" y="693" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">E</text>
  <text x="146" y="688" font-size="15" font-weight="700" fill="#0F172A">Amazon EventBridge</text>
  <text x="106" y="720" font-size="12" fill="#334155">Rule: <tspan font-family="Consolas, Menlo, monospace">trigger-s3-remediation</tspan></text>
  <text x="106" y="744" font-size="11.5" fill="#334155">detail-type: Config Rules Compliance Change</text>
  <text x="106" y="768" font-size="11.5" fill="#334155">Filter: complianceType = <tspan font-weight="700" fill="#DC2626">NON_COMPLIANT</tspan></text>
  <text x="106" y="790" font-size="10.5" fill="#94A3B8">Status: Enabled &#183; default event bus</text>

  <!-- Lambda (hub) -->
  <g filter="url(#sh)">
    <rect x="558" y="430" width="322" height="200" rx="14" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
  </g>
  <rect x="576" y="448" width="30" height="30" rx="7" fill="#EA580C"/>
  <text x="591" y="469" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">&#955;</text>
  <text x="616" y="463" font-size="16" font-weight="700" fill="#0F172A">AWS Lambda</text>
  <text x="576" y="498" font-size="12" font-family="Consolas, Menlo, monospace" fill="#334155">remediate-s3-public-access</text>
  <text x="576" y="518" font-size="11.5" fill="#64748B">Runtime: Python 3.12</text>
  <line x1="576" y1="532" x2="862" y2="532" stroke="#E2E8F0" stroke-width="1"/>
  <text x="576" y="554" font-size="11.5" fill="#334155">Parses configRuleName, resourceId, resourceType</text>
  <text x="576" y="576" font-size="11.5" fill="#334155">Routes to the matching remediation handler</text>
  <text x="576" y="600" font-size="11" fill="#94A3B8">Env: DYNAMODB_TABLE, SNS_TOPIC_ARN</text>
  <text x="576" y="620" font-size="11" fill="#94A3B8">Remediation engine</text>

  <!-- Remediation Actions -->
  <g filter="url(#sh)">
    <rect x="1040" y="200" width="300" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="1056" y="216" width="28" height="28" rx="7" fill="#16A34A"/>
  <text x="1070" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">&#10003;</text>
  <text x="1096" y="230" font-size="15" font-weight="700" fill="#0F172A">Remediation Actions</text>
  <text x="1056" y="262" font-size="11.5" fill="#334155">S3 &#8594; Public Access Block + delete policy</text>
  <text x="1056" y="284" font-size="11.5" fill="#334155">SSH &#8594; revoke 0.0.0.0/0 on port 22</text>
  <text x="1056" y="306" font-size="11.5" fill="#334155">MFA &#8594; alert-only (manual fix)</text>

  <!-- DynamoDB -->
  <g filter="url(#sh)">
    <rect x="1040" y="370" width="300" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="1056" y="386" width="28" height="28" rx="7" fill="#2563EB"/>
  <text x="1070" y="405" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">DB</text>
  <text x="1096" y="400" font-size="15" font-weight="700" fill="#0F172A">Amazon DynamoDB</text>
  <text x="1056" y="432" font-size="11.5" fill="#334155">Table: <tspan font-family="Consolas, Menlo, monospace">RemediationAuditLog</tspan></text>
  <text x="1056" y="456" font-size="10.5" fill="#64748B">id &#183; timestamp &#183; rule &#183; resource_id</text>
  <text x="1056" y="476" font-size="10.5" fill="#64748B">resource_type &#183; action &#183; status</text>

  <!-- CloudWatch -->
  <g filter="url(#sh)">
    <rect x="1040" y="540" width="300" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="1056" y="556" width="28" height="28" rx="7" fill="#0891B2"/>
  <text x="1070" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">CW</text>
  <text x="1096" y="570" font-size="15" font-weight="700" fill="#0F172A">Amazon CloudWatch</text>
  <text x="1056" y="602" font-size="11.5" fill="#334155">Lambda execution logs</text>
  <text x="1056" y="626" font-size="10.5" font-family="Consolas, Menlo, monospace" fill="#64748B">/aws/lambda/remediate-s3-public-access</text>
  <text x="1056" y="648" font-size="10.5" fill="#94A3B8">Operational &amp; forensic visibility</text>

  <!-- SNS -->
  <g filter="url(#sh)">
    <rect x="1040" y="710" width="300" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="1056" y="726" width="28" height="28" rx="7" fill="#E11D48"/>
  <text x="1070" y="745" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">@</text>
  <text x="1096" y="740" font-size="15" font-weight="700" fill="#0F172A">Amazon SNS</text>
  <text x="1056" y="772" font-size="11.5" fill="#334155">Topic: <tspan font-family="Consolas, Menlo, monospace">cloud-misconfig-alerts</tspan></text>
  <text x="1056" y="796" font-size="11" fill="#64748B">Publishes remediation report</text>

  <!-- Admin -->
  <g filter="url(#sh)">
    <rect x="1040" y="858" width="300" height="72" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <rect x="1056" y="876" width="28" height="28" rx="7" fill="#475569"/>
  <text x="1070" y="895" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">AD</text>
  <text x="1096" y="888" font-size="15" font-weight="700" fill="#0F172A">Security Administrator</text>
  <text x="1056" y="916" font-size="11.5" fill="#64748B">Receives real-time email notification</text>

  <!-- ================= STEP BADGES ================= -->
  <g font-size="13" font-weight="700" fill="#FFFFFF">
    <circle cx="240" cy="344" r="14" fill="#0F172A"/><text x="240" y="349" text-anchor="middle">1</text>
    <circle cx="240" cy="629" r="14" fill="#0F172A"/><text x="240" y="634" text-anchor="middle">2</text>
    <circle cx="475" cy="612" r="14" fill="#0F172A"/><text x="475" y="617" text-anchor="middle">3</text>
    <circle cx="1000" cy="260" r="14" fill="#0F172A"/><text x="1000" y="265" text-anchor="middle">4</text>
    <circle cx="1000" cy="765" r="14" fill="#0F172A"/><text x="1000" y="770" text-anchor="middle">5</text>
    <circle cx="1000" cy="430" r="14" fill="#0F172A"/><text x="1000" y="435" text-anchor="middle">6</text>
    <circle cx="1000" cy="600" r="14" fill="#0F172A"/><text x="1000" y="605" text-anchor="middle">7</text>
    <circle cx="455" cy="168" r="14" fill="#16A34A"/><text x="455" y="173" text-anchor="middle">8</text>
  </g>

  <!-- ================= LEGEND ================= -->
  <line x1="40" y1="996" x2="1400" y2="996" stroke="#CBD5E1" stroke-width="1"/>
  <text x="40" y="1020" font-size="12" font-weight="700" fill="#0F172A" letter-spacing="0.5">REMEDIATION FLOW</text>
  <g font-size="12.5" fill="#334155">
    <circle cx="208" cy="1015" r="10" fill="#0F172A"/><text x="208" y="1019" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">1</text><text x="226" y="1019">configuration change</text>
    <circle cx="478" cy="1015" r="10" fill="#0F172A"/><text x="478" y="1019" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">2</text><text x="496" y="1019">NON_COMPLIANT event</text>
    <circle cx="800" cy="1015" r="10" fill="#0F172A"/><text x="800" y="1019" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">3</text><text x="818" y="1019">invoke Lambda</text>
    <circle cx="1040" cy="1015" r="10" fill="#0F172A"/><text x="1040" y="1019" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">4</text><text x="1058" y="1019">remediate resource</text>

    <circle cx="208" cy="1050" r="10" fill="#0F172A"/><text x="208" y="1054" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">5</text><text x="226" y="1054">email alert (SNS)</text>
    <circle cx="478" cy="1050" r="10" fill="#0F172A"/><text x="478" y="1054" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">6</text><text x="496" y="1054">audit record (DynamoDB)</text>
    <circle cx="800" cy="1050" r="10" fill="#0F172A"/><text x="800" y="1054" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">7</text><text x="818" y="1054">execution logs (CloudWatch)</text>
    <circle cx="1040" cy="1050" r="10" fill="#16A34A"/><text x="1040" y="1054" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">8</text><text x="1058" y="1054" fill="#16A34A" font-weight="600">resource secured (loop)</text>
  </g>
</svg>